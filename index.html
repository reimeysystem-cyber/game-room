<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy Board - ゲーム募集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-morphism { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4 md:p-8">

    <!-- パスワード認証セクション -->
    <div id="auth-section" class="w-full max-w-md mt-20 p-8 glass-morphism rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">🔒 Secret Access</h1>
        <div class="space-y-4">
            <input type="password" id="password-input" placeholder="パスワードを入力してください" 
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="checkPassword()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
                ログイン
            </button>
            <p id="auth-error" class="text-red-500 text-sm text-center hidden">パスワードが正しくありません。</p>
            <p id="loading-msg" class="text-blue-500 text-sm text-center hidden">接続中...</p>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <div id="main-content" class="w-full max-w-4xl hidden space-y-6">
        <header class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-blue-600">Buddy Board</h1>
                <p class="text-gray-500 text-sm">友達専用のゲーム募集掲示板</p>
            </div>
            <div id="user-info" class="flex items-center gap-3">
                <span id="display-name" class="font-semibold text-gray-700 text-sm"></span>
                <button onclick="resetUserName()" class="text-xs text-blue-500 hover:underline">名前を変更</button>
            </div>
        </header>

        <div id="name-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
            <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
                <h2 class="text-xl font-bold mb-4 text-gray-800">名前を設定してください</h2>
                <input type="text" id="username-input" placeholder="あなたの名前" class="w-full px-4 py-3 rounded-lg border border-gray-300 mb-4 outline-none">
                <button onclick="saveUserName()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">決定</button>
            </div>
        </div>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-bold mb-4">新しく募集する</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="game-name" placeholder="ゲーム名" class="w-full px-4 py-2 rounded-lg border border-gray-300">
                <input type="text" id="game-time" placeholder="時間" class="w-full px-4 py-2 rounded-lg border border-gray-300">
                <select id="is-active" class="w-full px-4 py-2 rounded-lg border border-gray-300">
                    <option value="●">● (募集中)</option>
                    <option value="×">× (終了)</option>
                </select>
            </div>
            <button onclick="addPost()" class="mt-4 px-10 py-3 bg-blue-600 text-white font-bold rounded-lg transition">投稿する</button>
        </section>

        <section>
            <h2 class="text-xl font-bold mb-4">募集一覧</h2>
            <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="text-center text-gray-400 italic">読み込み中...</div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Variables from environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'game-board-v1';
        const APP_PASSWORD = "1234"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserName = localStorage.getItem('game_username') || "";
        let currentUser = null;

        // Exponential backoff for authentication (Error Handling)
        async function authenticate(retryCount = 0) {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                if (retryCount < 5) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    setTimeout(() => authenticate(retryCount + 1), delay);
                } else {
                    document.getElementById('loading-msg').textContent = "接続エラー。ページを再読み込みしてください。";
                    document.getElementById('loading-msg').classList.replace('text-blue-500', 'text-red-500');
                }
            }
        }

        window.checkPassword = () => {
            const input = document.getElementById('password-input').value;
            if (input === APP_PASSWORD) {
                document.getElementById('auth-error').classList.add('hidden');
                document.getElementById('loading-msg').classList.remove('hidden');
                authenticate();
            } else {
                document.getElementById('auth-error').classList.remove('hidden');
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                if (!currentUserName) {
                    document.getElementById('name-modal').classList.remove('hidden');
                } else {
                    startListening();
                }
            }
        });

        window.saveUserName = () => {
            const nameInput = document.getElementById('username-input').value;
            if (!nameInput.trim()) return;
            currentUserName = nameInput;
            localStorage.setItem('game_username', nameInput);
            document.getElementById('name-modal').classList.add('hidden');
            startListening();
        };

        window.resetUserName = () => {
            localStorage.removeItem('game_username');
            location.reload();
        };

        function startListening() {
            if (!currentUser) return;
            // RULE 1: Strict Paths
            const collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
            
            onSnapshot(collectionPath, (snapshot) => {
                const posts = [];
                snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
                // RULE 2: Client-side sorting
                posts.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderPosts(posts);
            }, (error) => {
                console.error("Firestore Listen Error:", error);
            });
        }

        window.addPost = async () => {
            if (!currentUser || !currentUserName) return;
            const game = document.getElementById('game-name').value;
            const time = document.getElementById('game-time').value;
            const status = document.getElementById('is-active').value;
            if (!game || !time) return;

            try {
                const collectionPath = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                await addDoc(collectionPath, {
                    game, 
                    time, 
                    status, 
                    userName: currentUserName, 
                    userId: currentUser.uid, 
                    createdAt: serverTimestamp()
                });
                document.getElementById('game-name').value = "";
                document.getElementById('game-time').value = "";
            } catch (e) {
                console.error("Add Doc Error:", e);
            }
        };

        window.deletePost = async (id) => {
            if (!currentUser || !confirm("削除しますか？")) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', id);
                await deleteDoc(docRef);
            } catch (e) {
                console.error("Delete Doc Error:", e);
            }
        };

        function renderPosts(posts) {
            document.getElementById('display-name').textContent = `ようこそ、${currentUserName}さん`;
            const container = document.getElementById('posts-container');
            
            if (posts.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-400 italic py-10">現在募集はありません。</div>';
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 ${post.status === '●' ? 'border-green-500' : 'border-gray-300'}">
                    <div class="flex justify-between items-start">
                        <span class="text-xs font-bold ${post.status === '●' ? 'text-green-600' : 'text-gray-400'}">
                            ${post.status === '●' ? '募集中' : '終了'}
                        </span>
                        ${post.userId === currentUser.uid ? `<button onclick="deletePost('${post.id}')" class="text-gray-300 hover:text-red-500 transition">削除</button>` : ''}
                    </div>
                    <h3 class="text-lg font-bold text-gray-800 mt-1">${escapeHtml(post.game)}</h3>
                    <div class="mt-2 space-y-1 text-sm text-gray-600">
                        <p><span class="font-semibold">時間:</span> ${escapeHtml(post.time)}</p>
                        <p><span class="font-semibold">投稿者:</span> ${escapeHtml(post.userName)}</p>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
