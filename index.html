<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ROOM - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 1. パスワード画面 -->
    <div id="auth-box" class="glass p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border border-white/20">
        <h1 class="text-4xl font-black mb-2 text-slate-800 italic tracking-tighter uppercase">Game Room</h1>
        <p class="text-[10px] font-bold text-slate-400 tracking-[0.2em] mb-8 uppercase text-center italic">Authorization Required</p>
        <input type="password" id="pass" placeholder="PASSWORD" 
               class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl mb-4 text-center text-2xl font-mono outline-none transition-all">
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg transition-all active:scale-95">
            ENTER
        </button>
        <p id="err" class="mt-6 text-xs text-rose-500 font-bold hidden"></p>
    </div>

    <!-- 2. 名前入力画面 -->
    <div id="name-box" class="hidden glass p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
        <h2 class="text-2xl font-black mb-2 text-slate-800 italic uppercase">Profile Setup</h2>
        <p class="text-[10px] font-bold text-slate-400 tracking-[0.2em] mb-8 uppercase text-center italic">Set your display name</p>
        <input type="text" id="user-name" placeholder="YOUR NAME" maxlength="12"
               class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl mb-4 text-center text-xl font-bold outline-none transition-all">
        <button id="start-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-lg transition-all active:scale-95">
            START
        </button>
    </div>

    <!-- 3. メイン掲示板 -->
    <div id="main-box" class="hidden w-full max-w-2xl glass p-8 rounded-[3rem] shadow-2xl text-slate-900 border border-white/20">
        <div class="flex justify-between items-end mb-8 px-2">
            <div>
                <h2 class="text-2xl font-black italic tracking-tighter text-blue-600 uppercase">Game Room</h2>
                <p id="welcome-msg" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Welcome!</p>
            </div>
            <button id="logout-btn" class="text-[10px] font-black text-slate-300 hover:text-rose-500 transition-colors uppercase border-b border-slate-200 pb-1">Logout / Reset Name</button>
        </div>

        <!-- 投稿フォーム -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 p-6 bg-slate-100/50 rounded-[2rem]">
            <input type="text" id="g-name" placeholder="GAME TITLE" class="w-full p-4 bg-white rounded-xl outline-none border-2 border-transparent focus:border-blue-500 font-bold shadow-sm">
            <input type="text" id="g-time" placeholder="TIME / SCHEDULE" class="w-full p-4 bg-white rounded-xl outline-none border-2 border-transparent focus:border-blue-500 font-bold shadow-sm">
            <button id="post-btn" class="md:col-span-2 bg-slate-900 hover:bg-black text-white font-black py-4 rounded-xl shadow-xl transition-all active:scale-95">
                RECRUIT NOW
            </button>
        </div>

        <!-- 投稿リスト -->
        <div id="list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scroll"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX900lgyFQ1FgXeQQFqf-wrnuoanUyqjI",
            authDomain: "game-room-4f746.firebaseapp.com",
            projectId: "game-room-4f746",
            storageBucket: "game-room-4f746.firebasestorage.app",
            messagingSenderId: "584699897796",
            appId: "1:584699897796:web:7fc3f2cd46883e90ab2691"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myDisplayName = localStorage.getItem('game_room_name') || "";

        // パスワードログイン
        document.getElementById('login-btn').onclick = async () => {
            if(document.getElementById('pass').value !== "1234") {
                const errEl = document.getElementById('err');
                errEl.textContent = "INVALID PASSWORD";
                errEl.classList.remove('hidden');
                return;
            }
            try { await signInAnonymously(auth); } catch(e) { alert("Auth Error"); }
        };

        // ログアウト & 名前リセット
        document.getElementById('logout-btn').onclick = async () => {
            if(confirm("LOGOUT AND RESET YOUR NAME?")) {
                localStorage.removeItem('game_room_name');
                await signOut(auth);
                location.reload();
            }
        };

        // ユーザー名決定
        document.getElementById('start-btn').onclick = () => {
            const name = document.getElementById('user-name').value.trim();
            if(!name) return;
            myDisplayName = name;
            localStorage.setItem('game_room_name', name);
            showMain();
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-box').classList.add('hidden');
                if(!myDisplayName) {
                    document.getElementById('name-box').classList.remove('hidden');
                } else {
                    showMain();
                }
            }
        });

        function showMain() {
            document.getElementById('name-box').classList.add('hidden');
            document.getElementById('main-box').classList.remove('hidden');
            document.getElementById('welcome-msg').textContent = `Hi, ${myDisplayName}!`;
            initBoard(auth.currentUser.uid);
        }

        function initBoard(myUid) {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                snapshot.forEach(d => {
                    const data = d.data();
                    const attendees = data.attendees || [];
                    const isJoined = attendees.includes(myDisplayName);
                    
                    const item = document.createElement('div');
                    item.className = "p-6 bg-white rounded-[2rem] border border-slate-100 shadow-sm transition-all hover:shadow-md";
                    item.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[10px] font-black text-blue-500 mb-1 uppercase italic tracking-tighter">${data.userName || 'Guest'}</p>
                                <h3 class="font-black text-xl text-slate-800 leading-tight">${data.game}</h3>
                                <p class="text-sm font-bold text-slate-400 italic">at ${data.time}</p>
                            </div>
                            ${data.userId === myUid ? 
                                `<button onclick="window.delPost('${d.id}')" class="text-slate-300 hover:text-rose-500 p-2 transition-all uppercase text-[10px] font-bold">Delete</button>` : 
                                ''}
                        </div>
                        
                        <div class="flex flex-wrap items-center gap-2 border-t pt-4 border-slate-50">
                            <button onclick="window.toggleJoin('${d.id}', ${isJoined})" 
                                class="flex items-center gap-2 px-4 py-2 rounded-full text-[11px] font-black transition-all ${isJoined ? 'bg-emerald-500 text-white shadow-emerald-200' : 'bg-slate-100 text-slate-500 hover:bg-slate-200 shadow-transparent'} shadow-lg">
                                ${isJoined ? '✓ JOINING' : '＋ JOIN'}
                            </button>
                            <div class="flex -space-x-2 overflow-hidden ml-2">
                                ${attendees.length > 0 ? attendees.map(name => `<div class="inline-block px-3 py-1 bg-slate-50 border border-white rounded-full text-[9px] font-bold text-slate-500">${name}</div>`).join('') : '<span class="text-[10px] text-slate-300 font-bold ml-1 uppercase">No one joined yet</span>'}
                            </div>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        // 参加・キャンセル切り替え
        window.toggleJoin = async (id, isJoined) => {
            if(!myDisplayName) return;
            const postRef = doc(db, "posts", id);
            try {
                if(isJoined) {
                    await updateDoc(postRef, { attendees: arrayRemove(myDisplayName) });
                } else {
                    await updateDoc(postRef, { attendees: arrayUnion(myDisplayName) });
                }
            } catch(e) { console.error(e); }
        };

        // 投稿
        document.getElementById('post-btn').onclick = async () => {
            const game = document.getElementById('g-name').value.trim();
            const time = document.getElementById('g-time').value.trim();
            if(!game || !time) return;
            try {
                await addDoc(collection(db, "posts"), {
                    game, time,
                    userName: myDisplayName,
                    userId: auth.currentUser.uid,
                    attendees: [],
                    createdAt: serverTimestamp()
                });
                document.getElementById('g-name').value = "";
                document.getElementById('g-time').value = "";
            } catch(e) { alert("Error"); }
        };

        window.delPost = async (id) => {
            if(confirm("DELETE THIS POST?")) { await deleteDoc(doc(db, "posts", id)); }
        };
    </script>
</body>
</html>
