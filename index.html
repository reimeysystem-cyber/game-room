<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ROOM - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- ログイン画面 -->
    <div id="auth-box" class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
        <h1 class="text-4xl font-black mb-2 text-slate-800 italic tracking-tighter">GAME ROOM</h1>
        <p class="text-[10px] font-bold text-slate-400 tracking-[0.2em] mb-8 uppercase">Buddy Connection</p>
        
        <input type="password" id="pass" placeholder="PASS: 1234" 
               class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl mb-4 text-center text-2xl font-mono outline-none transition-all">
        
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
            ENTER ROOM
        </button>
        <p id="err" class="mt-6 text-xs text-rose-500 font-bold hidden"></p>
    </div>

    <!-- メイン画面 -->
    <div id="main-box" class="hidden w-full max-w-2xl bg-white p-8 rounded-[3rem] shadow-2xl text-slate-900">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-2xl font-black italic tracking-tighter text-blue-600">GAME ROOM</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Recruits</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] font-black text-slate-300 hover:text-rose-500 transition-colors uppercase border-b pb-1">Logout</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10 p-6 bg-slate-50 rounded-[2rem]">
            <input type="text" id="g-name" placeholder="GAME TITLE" class="w-full p-4 bg-white rounded-xl outline-none border-2 border-transparent focus:border-blue-500 font-bold">
            <input type="text" id="g-time" placeholder="TIME / SCHEDULE" class="w-full p-4 bg-white rounded-xl outline-none border-2 border-transparent focus:border-blue-500 font-bold">
            <button id="post-btn" class="md:col-span-2 bg-slate-900 hover:bg-black text-white font-black py-4 rounded-xl shadow-xl transition-all active:scale-95">
                RECRUIT NOW
            </button>
        </div>

        <div id="list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
            <!-- 投稿がここに表示されます -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 送っていただいた最新の情報を反映
        const firebaseConfig = {
            apiKey: "AIzaSyAX900lgyFQ1FgXeQQFqf-wrnuoanUyqjI",
            authDomain: "game-room-4f746.firebaseapp.com",
            projectId: "game-room-4f746",
            storageBucket: "game-room-4f746.firebasestorage.app",
            messagingSenderId: "584699897796",
            appId: "1:584699897796:web:7fc3f2cd46883e90ab2691"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const errEl = document.getElementById('err');

        // ログイン処理
        document.getElementById('login-btn').onclick = async () => {
            if(document.getElementById('pass').value !== "1234") {
                showErr("INVALID PASSWORD"); return;
            }
            try {
                await signInAnonymously(auth);
            } catch(e) {
                showErr("AUTH ERROR: " + e.code);
            }
        };

        function showErr(msg) {
            errEl.textContent = msg;
            errEl.classList.remove('hidden');
        }

        // 状態監視
        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('main-box').classList.remove('hidden');
                initBoard(user.uid);
            }
        });

        // 掲示板初期化
        function initBoard(myUid) {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                if(snapshot.empty) {
                    list.innerHTML = `<div class="text-center py-10 text-slate-300 font-bold italic">NO RECRUITS YET</div>`;
                }
                snapshot.forEach(d => {
                    const data = d.data();
                    const item = document.createElement('div');
                    item.className = "p-6 bg-slate-50 rounded-[1.5rem] border border-slate-100 flex justify-between items-center";
                    item.innerHTML = `
                        <div>
                            <h3 class="font-black text-xl text-slate-800 uppercase">${data.game}</h3>
                            <p class="text-sm font-bold text-blue-600 italic">@ ${data.time}</p>
                        </div>
                        ${data.userId === myUid ? `<button onclick="window.delPost('${d.id}')" class="text-slate-300 hover:text-rose-500 transition-colors uppercase text-[10px] font-bold">Delete</button>` : ''}
                    `;
                    list.appendChild(item);
                });
            });
        }

        // 投稿
        document.getElementById('post-btn').onclick = async () => {
            const game = document.getElementById('g-name').value.trim();
            const time = document.getElementById('g-time').value.trim();
            if(!game || !time) return;
            
            try {
                await addDoc(collection(db, "posts"), {
                    game, time,
                    userId: auth.currentUser.uid,
                    createdAt: serverTimestamp()
                });
                document.getElementById('g-name').value = "";
                document.getElementById('g-time').value = "";
            } catch(e) {
                alert("送信エラー: Firestoreのルールを確認してください");
            }
        };

        window.delPost = async (id) => {
            if(confirm("DELETE THIS RECRUIT?")) {
                await deleteDoc(doc(db, "posts", id));
            }
        };
    </script>
</body>
</html>
