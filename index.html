<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME ROOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 1. ログイン画面（パスワード） -->
    <div id="auth-box" class="glass p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
        <h1 class="text-4xl font-black mb-2 text-slate-800 italic tracking-tighter uppercase">Game Room</h1>
        <p class="text-[10px] font-bold text-slate-400 tracking-[0.2em] mb-8 uppercase text-center">Step 1: Authorization</p>
        <input type="password" id="pass" placeholder="PASS: 1234" 
               class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl mb-4 text-center text-2xl font-mono outline-none transition-all">
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg transition-all active:scale-95">
            NEXT
        </button>
        <p id="err" class="mt-6 text-xs text-rose-500 font-bold hidden"></p>
    </div>

    <!-- 2. ユーザー名設定画面 -->
    <div id="name-box" class="hidden glass p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
        <h2 class="text-2xl font-black mb-2 text-slate-800 italic">WHO ARE YOU?</h2>
        <p class="text-[10px] font-bold text-slate-400 tracking-[0.2em] mb-8 uppercase text-center">Step 2: Profile</p>
        <input type="text" id="user-name" placeholder="YOUR NAME" maxlength="10"
               class="w-full p-5 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl mb-4 text-center text-xl font-bold outline-none transition-all">
        <button id="start-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-lg transition-all active:scale-95">
            START BOARD
        </button>
    </div>

    <!-- 3. メイン掲示板 -->
    <div id="main-box" class="hidden w-full max-w-2xl glass p-8 rounded-[3rem] shadow-2xl text-slate-900">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-2xl font-black italic tracking-tighter text-blue-600">GAME ROOM</h2>
                <p id="welcome-msg" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Welcome!</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] font-black text-slate-300 hover:text-rose-500 transition-colors uppercase border-b pb-1">Logout</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 p-6 bg-slate-100/50 rounded-[2rem]">
            <input type="text" id="g-name" placeholder="GAME TITLE" class="w-full p-4 bg-white rounded-xl outline-none border-2 border-transparent focus:border-blue-500 font-bold">
            <input type="text" id="g-time" placeholder="TIME / SCHEDULE" class="w-full p-4 bg-white rounded-xl outline-none border-2 border-transparent focus:border-blue-500 font-bold">
            <button id="post-btn" class="md:col-span-2 bg-slate-900 hover:bg-black text-white font-black py-4 rounded-xl shadow-xl transition-all active:scale-95">
                RECRUIT NOW
            </button>
        </div>

        <div id="list" class="space-y-4 max-h-[450px] overflow-y-auto pr-2"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX900lgyFQ1FgXeQQFqf-wrnuoanUyqjI",
            authDomain: "game-room-4f746.firebaseapp.com",
            projectId: "game-room-4f746",
            storageBucket: "game-room-4f746.firebasestorage.app",
            messagingSenderId: "584699897796",
            appId: "1:584699897796:web:7fc3f2cd46883e90ab2691"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myDisplayName = localStorage.getItem('game_room_name') || "";

        // 1. パスワードログイン
        document.getElementById('login-btn').onclick = async () => {
            if(document.getElementById('pass').value !== "029312") {
                const errEl = document.getElementById('err');
                errEl.textContent = "INVALID PASSWORD";
                errEl.classList.remove('hidden');
                return;
            }
            try {
                await signInAnonymously(auth);
            } catch(e) {
                alert("Auth Error: " + e.code);
            }
        };

        // 2. ユーザー名決定
        document.getElementById('start-btn').onclick = () => {
            const name = document.getElementById('user-name').value.trim();
            if(!name) return;
            myDisplayName = name;
            localStorage.setItem('game_room_name', name);
            showMain();
        };

        // 状態監視
        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-box').classList.add('hidden');
                if(!myDisplayName) {
                    document.getElementById('name-box').classList.remove('hidden');
                } else {
                    showMain();
                }
            }
        });

        function showMain() {
            document.getElementById('name-box').classList.add('hidden');
            document.getElementById('main-box').classList.remove('hidden');
            document.getElementById('welcome-msg').textContent = `Hi, ${myDisplayName}!`;
            initBoard(auth.currentUser.uid);
        }

        function initBoard(myUid) {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                snapshot.forEach(d => {
                    const data = d.data();
                    const item = document.createElement('div');
                    item.className = "p-6 bg-slate-50/80 rounded-[1.8rem] border border-slate-100 flex justify-between items-center shadow-sm";
                    item.innerHTML = `
                        <div>
                            <p class="text-[10px] font-black text-blue-500 mb-1 uppercase tracking-tighter italic">${data.userName || 'Guest'}</p>
                            <h3 class="font-black text-xl text-slate-800 leading-tight">${data.game}</h3>
                            <p class="text-sm font-bold text-slate-400 italic">at ${data.time}</p>
                        </div>
                        ${data.userId === myUid ? `<button onclick="window.delPost('${d.id}')" class="bg-rose-50 text-rose-400 p-2 px-3 rounded-xl hover:bg-rose-500 hover:text-white transition-all text-[10px] font-black uppercase">Del</button>` : ''}
                    `;
                    list.appendChild(item);
                });
            });
        }

        document.getElementById('post-btn').onclick = async () => {
            const game = document.getElementById('g-name').value.trim();
            const time = document.getElementById('g-time').value.trim();
            if(!game || !time) return;
            
            try {
                await addDoc(collection(db, "posts"), {
                    game, time,
                    userName: myDisplayName,
                    userId: auth.currentUser.uid,
                    createdAt: serverTimestamp()
                });
                document.getElementById('g-name').value = "";
                document.getElementById('g-time').value = "";
            } catch(e) {
                alert("Error: Firestore rules might be blocking write.");
            }
        };

        window.delPost = async (id) => {
            if(confirm("DELETE THIS POST?")) {
                await deleteDoc(doc(db, "posts", id));
            }
        };
    </script>
</body>
</html>
